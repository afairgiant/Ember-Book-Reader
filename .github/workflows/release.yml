name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0). Leave empty for manual APK build only.'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        if: env.HAS_SIGNING == 'true'
        run: echo "$SIGNING_KEYSTORE" | base64 -d > keystore.jks
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      - name: Build release APK (signed)
        if: env.HAS_SIGNING == 'true'
        run: ./gradlew assembleRelease --parallel --build-cache -x lintDebug -x testDebugUnitTest -x lintRelease -x testReleaseUnitTest
        env:
          SIGNING_KEYSTORE_PATH: keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Build release APK (unsigned fallback)
        if: env.HAS_SIGNING != 'true'
        run: ./gradlew assembleRelease --parallel --build-cache -x lintDebug -x testDebugUnitTest -x lintRelease -x testReleaseUnitTest

      - name: Prepare APK
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' -type f | head -1)
          if [ -n "$APK" ]; then
            VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
            cp "$APK" "dist/ember-${VERSION}.apk"
          else
            echo "ERROR: No APK found"
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          CURRENT_TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "Co-Authored-By")
          else
            echo "No previous tag found, using last 20 commits"
            CHANGES=$(git log -20 --pretty=format:"- %s" --no-merges | grep -v "Co-Authored-By")
          fi

          # Categorize changes
          FEATURES=$(echo "$CHANGES" | grep -i "^- feat:" | sed 's/^- feat: /- /' || true)
          FIXES=$(echo "$CHANGES" | grep -i "^- fix:" | sed 's/^- fix: /- /' || true)
          OTHER=$(echo "$CHANGES" | grep -iv "^- feat:\|^- fix:\|^- chore:\|^- style:\|^- docs:\|^- perf:" || true)
          CHORES=$(echo "$CHANGES" | grep -i "^- chore:\|^- style:\|^- docs:\|^- perf:" | sed 's/^- \(chore\|style\|docs\|perf\): /- /' || true)

          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's New"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES"
              echo ""
            fi
            echo "---"
            echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG:-HEAD}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-apk
          path: dist/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*.apk
