name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode keystore
        if: env.HAS_SIGNING == 'true'
        run: echo "$SIGNING_KEYSTORE" | base64 -d > keystore.jks
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      - name: Build release APK (signed)
        if: env.HAS_SIGNING == 'true'
        run: ./gradlew assembleRelease --parallel --build-cache -x lintDebug -x testDebugUnitTest -x lintRelease -x testReleaseUnitTest
        env:
          SIGNING_KEYSTORE_PATH: keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Build release APK (unsigned fallback)
        if: env.HAS_SIGNING != 'true'
        run: ./gradlew assembleRelease --parallel --build-cache -x lintDebug -x testDebugUnitTest -x lintRelease -x testReleaseUnitTest

      - name: Prepare APK
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" dist/Ember-Reader.apk
          else
            echo "ERROR: No APK found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-apk
          path: dist/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.apk
